<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五線譜リーディングアプリ</title>
  <!-- Tailwind CSS を読み込む (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 音楽記号（ト音記号など）を文字化けさせないためのWebフォントを読み込む -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Music&display=swap" rel="stylesheet">
  <style>
    /* === アニメーションの定義 === */
    @keyframes flyCurve {
      0% { transform: translate(0, 0) scale(var(--b-scale)) rotate(0deg); opacity: 1; }
      10% { transform: translate(0, 10px) scale(calc(var(--b-scale) * 1.05)) rotate(0deg); opacity: 1; } 
      100% { transform: translate(var(--fly-x, 0px), -600px) scale(calc(var(--b-scale) * 0.6)) rotate(var(--fly-rot, 0deg)); opacity: 0; }
    }
    .animate-flyAway { animation: flyCurve 1.5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }
    
    @keyframes shakeNote {
      0%, 100% { transform: translateX(0) scale(var(--b-scale)); }
      15%, 45%, 75% { transform: translateX(-15px) scale(calc(var(--b-scale) * 1.1)) rotate(-8deg); }
      30%, 60%, 90% { transform: translateX(15px) scale(calc(var(--b-scale) * 1.1)) rotate(8deg); }
    }
    .animate-shakeNote { animation: shakeNote 1s ease-in-out infinite; }
    
    @keyframes popUp {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      50% { transform: translateY(-30px) scale(1.2); opacity: 1; }
      100% { transform: translateY(-50px) scale(1); opacity: 0; }
    }
    .animate-popUp { animation: popUp 1.5s ease-out forwards; }
    
    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .animate-confetti { animation: confetti linear infinite; }
  </style>
</head>
<body class="flex justify-center items-center min-h-screen bg-gray-100 p-4 font-sans m-0">

  <!-- === ゲーム画面本体 === -->

    <!-- 五線譜と音符 -->

        <line x1="0" y1="75" x2="500" y2="75" stroke="#000" stroke-width="3" />

        <line x1="0" y1="125" x2="500" y2="125" stroke="#000" stroke-width="3" />

    <!-- 風船ボタン -->

    </div>

    <!-- リザルト画面 -->
    <div id="overlay-result" class="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm overflow-hidden hidden">
      <div id="confetti-container" class="absolute inset-0 pointer-events-none z-0 hidden"></div>
      <div id="result-content" class="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-md w-full border-4 border-blue-400 transform transition-all relative z-10">
        <!-- JSで動的に生成 -->
      </div>
    </div>

    <!-- 全クリ画面 -->
    <div id="overlay-allclear" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-yellow-100 hidden">
       <div class="text-5xl font-black text-yellow-600 mb-8 animate-bounce">全17ステージクリア！</div>
       <div class="text-2xl font-bold text-gray-800 mb-8">あなたは音符マスターです！</div>
       <button class="py-4 px-8 bg-orange-500 hover:bg-orange-600 text-white text-2xl font-bold rounded-full shadow-xl transition-transform hover:scale-110 active:scale-95" onclick="startGame(1)">
          最初から遊ぶ
        </button>
    </div>

    <!-- スタート用オーバーレイ -->
    <div id="overlay-start" class="absolute inset-0 z-50 cursor-pointer flex items-end justify-center pb-8 animate-pulse" onclick="startGame(1)">
      <div class="bg-white/90 px-8 py-3 rounded-full font-bold text-orange-500 text-xl shadow-lg border-4 border-orange-400">
        画面をクリックしてスタート！

  </div>

  <script>
    // === データの定義 ===
    const ALL_NOTES = {
      'g3': { id: 'g3', label: 'ソ', y: 212.5, freq: 196.00, color: '#4ADE80' },
      'a3': { id: 'a3', label: 'ラ', y: 200,   freq: 220.00, color: '#60A5FA' },
      'b3': { id: 'b3', label: 'シ', y: 187.5, freq: 246.94, color: '#F87171' },
      'c4': { id: 'c4', label: 'ド', y: 175,   freq: 261.63, color: '#D946EF' },
      'd4': { id: 'd4', label: 'レ', y: 162.5, freq: 293.66, color: '#FDE047' },
      'e4': { id: 'e4', label: 'ミ', y: 150,   freq: 329.63, color: '#38BDF8' },
      'f4': { id: 'f4', label: 'ファ', y: 137.5, freq: 349.23, color: '#FB923C' },
      'g4': { id: 'g4', label: 'ソ', y: 125,   freq: 392.00, color: '#4ADE80' },
      'a4': { id: 'a4', label: 'ラ', y: 112.5, freq: 440.00, color: '#60A5FA' },
      'b4': { id: 'b4', label: 'シ', y: 100,   freq: 493.88, color: '#F87171' },
      'c5': { id: 'c5', label: 'ド', y: 87.5,  freq: 523.25, color: '#D946EF' },
      'd5': { id: 'd5', label: 'レ', y: 75,    freq: 587.33, color: '#FDE047' },
      'e5': { id: 'e5', label: 'ミ', y: 62.5,  freq: 659.25, color: '#38BDF8' },
      'f5': { id: 'f5', label: 'ファ', y: 50,    freq: 698.46, color: '#FB923C' },
      'g5': { id: 'g5', label: 'ソ', y: 37.5,  freq: 783.99, color: '#4ADE80' },
    };

    const STAGES = [
      ['c4', 'd4', 'e4'],
      ['f4', 'g4', 'a4'],
      ['b4', 'c5', 'd5'],
      ['e5', 'f5', 'g5'],
      ['g3', 'a3', 'b3'],
      ['c4', 'd4', 'e4', 'f4'],
      ['c4', 'd4', 'e4', 'f4', 'g4'],
      ['c4', 'd4', 'e4', 'f4', 'g4', 'a4'],
      ['c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4'],
      ['c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5'],
      ['c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5'],
      ['b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5'],
      ['b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5', 'e5'],
      ['a3', 'b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5', 'e5'],
      ['a3', 'b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5', 'e5', 'f5'],
      ['g3', 'a3', 'b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5', 'e5', 'f5'],
      ['g3', 'a3', 'b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5', 'e5', 'f5', 'g5'],
    ];

    // === 状態管理 ===
    const state = {
      stage: 1,
      gameState: 'start',
      questionCount: 0,
      score: 0,
      currentPoints: 0,
      currentNote: null,
      showNote: false,
      feedback: null, // 'correct' | 'wrong' | null
      questionList: [],
      startTime: null
    };

    let audioCtx = null;
    let bgmTimerId = null;
    let rAF_TimerId = null;

    // === オーディオ関連 ===
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function startBGM() {
      if (!audioCtx || bgmTimerId) return;
      let nextNoteTime = audioCtx.currentTime + 0.1;
      let current16thNote = 0;

      function playDrum(freq, type, decay, vol, time) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, time);
        if(type === 'sine') osc.frequency.exponentialRampToValueAtTime(0.01, time + decay);
        gain.gain.setValueAtTime(vol, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + decay);
        osc.start(time);
        osc.stop(time + decay);
      }

      function scheduleNote() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
          if (current16thNote % 8 === 0) playDrum(150, 'sine', 0.4, 0.6, nextNoteTime);
          else if (current16thNote % 8 === 4) playDrum(250, 'triangle', 0.2, 0.4, nextNoteTime);
          if (current16thNote % 2 === 0) playDrum(6000, 'square', 0.05, 0.05, nextNoteTime);
          
          nextNoteTime += 0.25 * (60.0 / 110);
          current16thNote = (current16thNote + 1) % 16;
        }
        bgmTimerId = setTimeout(scheduleNote, 25.0);
      }
      scheduleNote();
    }

    function stopBGM() {
      if (bgmTimerId) {
        clearTimeout(bgmTimerId);
        bgmTimerId = null;
      }
    }

    function playWrongSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
    }

    function playCorrectSound(note) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(note.label + 'ー');
        utterance.lang = 'ja-JP';
        const pitchMap = { 'g3': 0.6, 'a3': 0.7, 'b3': 0.8, 'c4': 1.0, 'd4': 1.1, 'e4': 1.2, 'f4': 1.3, 'g4': 1.4, 'a4': 1.5, 'b4': 1.6, 'c5': 1.7, 'd5': 1.8, 'e5': 1.9, 'f5': 2.0, 'g5': 2.0 };
        utterance.pitch = pitchMap[note.id] || 1.0;
        window.speechSynthesis.speak(utterance);
      }

      const oscNote = audioCtx.createOscillator();
      const gainNote = audioCtx.createGain();
      oscNote.type = 'sine';
      oscNote.frequency.setValueAtTime(note.freq, now);
      gainNote.gain.setValueAtTime(0.5, now);
      gainNote.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
      oscNote.connect(gainNote);
      gainNote.connect(audioCtx.destination);
      oscNote.start(now);
      oscNote.stop(now + 0.6);

      const oscCoin = audioCtx.createOscillator();
      const gainCoin = audioCtx.createGain();
      oscCoin.type = 'square';
      oscCoin.frequency.setValueAtTime(987.77, now);
      oscCoin.frequency.setValueAtTime(1318.51, now + 0.1);
      gainCoin.gain.setValueAtTime(0, now);
      gainCoin.gain.linearRampToValueAtTime(0.2, now + 0.05);
      gainCoin.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      oscCoin.connect(gainCoin);
      gainCoin.connect(audioCtx.destination);
      oscCoin.start(now);
      oscCoin.stop(now + 0.4);
    }

    function playFanfare() {
      if (!audioCtx) return;
      [261.63, 329.63, 392.00, 523.25].forEach((freq, i) => {
        setTimeout(() => {
          const osc = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
          gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
          osc.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.4);
        }, i * 150);
      });
    }

    function playSuperFanfare() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const notes = [
        { f: 261.63, t: 0 }, { f: 329.63, t: 0.1 }, { f: 392.00, t: 0.2 },
        { f: 523.25, t: 0.3 }, { f: 659.25, t: 0.4 }, { f: 783.99, t: 0.5 }, { f: 1046.50, t: 0.6 }
      ];
      notes.forEach(note => {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(note.f, now + note.t);
        gainNode.gain.setValueAtTime(0, now + note.t);
        gainNode.gain.linearRampToValueAtTime(0.2, now + note.t + 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + note.t + 0.5);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start(now + note.t);
        osc.stop(now + note.t + 0.5);
      });
      setTimeout(() => {
        [523.25, 659.25, 783.99, 1046.50].forEach(f => {
          const osc = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.setValueAtTime(f, audioCtx.currentTime);
          gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
          osc.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 1.5);
        });
      }, 700);
    }

    function playFailSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 1.5);
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 1.5);
    }

    // === UI更新関数 ===
    function updateCatFace(isWrong) {
      document.getElementById('cat-eye-l').setAttribute('cx', isWrong ? "43" : "48");
      document.getElementById('cat-eye-r').setAttribute('cx', isWrong ? "73" : "72");
      document.getElementById('cat-mouth').setAttribute('d', isWrong ? "M 50 70 Q 60 60 70 70" : "M 50 65 Q 60 75 70 65");
    }

    function setCatMessage(text, isCorrect = false, isWrong = false) {
      document.getElementById('ui-cat-message').innerHTML = text.replace(/\n/g, '<br/>');
      const catSvg = document.getElementById('cat-svg');
      if (isCorrect) {
        catSvg.classList.remove('animate-bounce');
        void catSvg.offsetWidth; // リフロー
        catSvg.classList.add('animate-bounce');
      } else {
        catSvg.classList.remove('animate-bounce');
      }
      updateCatFace(isWrong);
    }

    function updateScore(score) {
      document.getElementById('ui-score').innerText = score;
    }

function showAddedScore(points) {
  const el = document.getElementById('ui-added-score');
  el.innerText = '+' + points;
  el.classList.remove('hidden', 'animate-popUp');
  void el.offsetWidth;
  el.classList.add('animate-popUp');

  // ★追加：アニメーション後に確実に消す
  setTimeout(() => {
    el.classList.add('hidden');
  }, 1500);
}


    function renderStaffNote(note) {
      const g = document.getElementById('target-note-g');
      if (!note) {
        document.getElementById('staff-container').classList.add('hidden');
        g.innerHTML = '';
        return;
      }
      document.getElementById('staff-container').classList.remove('hidden');
      
      let html = '';
      const lines = [];
      if (note.y >= 175) lines.push(175);
      if (note.y >= 200) lines.push(200);
      if (note.y <= 25) lines.push(25);
      lines.forEach(ly => {
        html += `<line x1="210" y1="${ly}" x2="290" y2="${ly}" stroke="#000" stroke-width="4" />`;
      });
      html += `<ellipse cx="250" cy="${note.y}" rx="22" ry="15" fill="none" stroke="#000" stroke-width="5" transform="rotate(-15, 250, ${note.y})" />`;
      g.innerHTML = html;
    }

    function generateBalloons(stageNotes) {
      const container = document.getElementById('balloons-container');
      const count = stageNotes.length;
      let scale = 1, margin = 5;
      if (count >= 14) { scale = 0.50; margin = -12; }
      else if (count >= 11) { scale = 0.60; margin = -8; }
      else if (count >= 8) { scale = 0.70; margin = -4; }
      else if (count >= 6) { scale = 0.85; margin = 0; }
      
      container.innerHTML = stageNotes.map(note => `
        <div id="balloon-${note.id}" 
             class="balloon-btn relative flex flex-col items-center transition-transform duration-200 cursor-pointer opacity-50 pointer-events-none"
             style="--b-scale: ${scale}; transform: scale(${scale}); transform-origin: bottom center; margin: 0 ${margin}px;"
             onclick="handleGuess('${note.id}')">
          <div class="relative flex items-center justify-center w-24 h-28 rounded-[50%] shadow-[inset_-5px_-5px_15px_rgba(0,0,0,0.2),5px_5px_10px_rgba(0,0,0,0.2)]" style="background-color: ${note.color};">
            <span class="text-5xl font-black text-gray-900 tracking-tighter drop-shadow-sm">${note.label}</span>
            <div class="absolute top-2 left-3 w-5 h-7 bg-white/40 rounded-full transform rotate-45"></div>
          </div>
          <div class="w-0 h-0 border-l-[8px] border-l-transparent border-r-[8px] border-r-transparent border-b-[12px]" style="border-bottom-color: ${note.color};"></div>
          <div class="w-1 h-14 border-l-2 border-gray-600/60 -mt-1 rounded-bl-full"></div>
        </div>
      `).join('');
    }

    function updateBalloonsState(status, correctNoteId) {
      const balloons = document.querySelectorAll('.balloon-btn');
      balloons.forEach(b => {
        const noteId = b.id.replace('balloon-', '');
        b.className = `balloon-btn relative flex flex-col items-center transition-transform duration-200 cursor-pointer`;
        
        if (status === 'playing') {
          b.classList.add('opacity-100', 'pointer-events-auto', 'hover:-translate-y-2', 'active:scale-95');
        } else {
          b.classList.add('pointer-events-none');
          if (status === 'correct' && noteId === correctNoteId) {
            b.classList.add('animate-flyAway');
          } else if ((status === 'wrong' || status === 'timeout') && noteId === correctNoteId) {
            b.classList.add('animate-shakeNote', 'z-40', 'opacity-100');
          } else {
            b.classList.add('opacity-50');
          }
        }
      });
    }

    // === ゲームロジック ===
    function generateQuestions(stageNotes) {
      let list = [];
      let remaining = [...stageNotes];
      for (let i = 0; i < 10; i++) {
        const mustPick = stageNotes.length <= 10 ? remaining.length >= (10 - i) : true; 
        let candidates = mustPick && remaining.length > 0 ? remaining : stageNotes;
        if (i > 0) {
          const prevId = list[i - 1].id;
          let valid = candidates.filter(n => n.id !== prevId);
          if (valid.length === 0) valid = stageNotes.filter(n => n.id !== prevId);
          candidates = valid;
        }
        const picked = candidates[Math.floor(Math.random() * candidates.length)];
        list.push(picked);
        remaining = remaining.filter(n => n.id !== picked.id);
      }
      return list;
    }

    function updatePointsDisplay() {
      if (state.gameState === 'playing' && state.showNote && state.feedback === null) {
        // 10000ミリ秒で1000ポイント減る (10秒リミット)
        const elapsed = Date.now() - state.startTime;
        const nextPoints = Math.max(0, 1000 - Math.floor(elapsed / 10));
        
        const el = document.getElementById('ui-points');
        el.innerText = String(nextPoints).padStart(3, '0');
        el.className = nextPoints < 300 
          ? 'bg-red-500 text-white font-bold px-3 py-0.5 rounded shadow-inner min-w-[3rem] text-center transition-colors' 
          : 'bg-orange-400 text-white font-bold px-3 py-0.5 rounded shadow-inner min-w-[3rem] text-center transition-colors';
        
        if (nextPoints <= 0) {
          state.currentPoints = 0;
          handleTimeout();
        } else {
          rAF_TimerId = requestAnimationFrame(updatePointsDisplay);
        }
      }
    }

    window.startGame = function(targetStage = 1) {
      initAudio();
      document.getElementById('overlay-start').classList.add('hidden');
      document.getElementById('overlay-result').classList.add('hidden');
      document.getElementById('overlay-allclear').classList.add('hidden');

      state.stage = targetStage;
      state.score = 0;
      state.questionCount = 1;
      state.gameState = 'playing';
      state.feedback = null;
      state.showNote = false;

      document.getElementById('ui-stage').innerText = state.stage;
      updateScore(0);
      setCatMessage('第1問！');
      
      const targetNotes = STAGES[targetStage - 1].map(id => ALL_NOTES[id]);
      state.questionList = generateQuestions(targetNotes);
      generateBalloons(targetNotes);
      renderStaffNote(null);
      startBGM();

      setTimeout(() => {
        state.currentNote = state.questionList[0];
        state.showNote = true;
        renderStaffNote(state.currentNote);
        updateBalloonsState('playing', null);
        setCatMessage('どれかな？');
        
        state.startTime = Date.now();
        if(rAF_TimerId) cancelAnimationFrame(rAF_TimerId);
        updatePointsDisplay();
      }, 1000);
    }

    window.handleGuess = function(noteId) {
      if (state.gameState !== 'playing' || state.feedback !== null || !state.showNote) return;
      
      const elapsed = Date.now() - state.startTime;
      const actualPoints = Math.max(0, 1000 - Math.floor(elapsed / 10));
      const isCorrect = noteId === state.currentNote.id;

      state.feedback = isCorrect ? 'correct' : 'wrong';

      if (isCorrect) {
        const randomX = Math.floor(Math.random() * 300) - 150;
        const b = document.getElementById(`balloon-${noteId}`);
        b.style.setProperty('--fly-x', `${randomX}px`);
        b.style.setProperty('--fly-rot', `${randomX * 0.15}deg`);

        playCorrectSound(ALL_NOTES[noteId]);
        state.score += actualPoints;
        updateScore(state.score);
        showAddedScore(actualPoints);
        setCatMessage('正解！', true, false);
      } else {
        playWrongSound();
        setCatMessage('残念！', false, true);
      }

      updateBalloonsState(state.feedback, state.currentNote.id);
      scheduleNextQuestion();
    }

    function handleTimeout() {
      state.feedback = 'wrong';
      playWrongSound();
      setCatMessage('時間切れ！', false, true);
      updateBalloonsState('timeout', state.currentNote.id);
      scheduleNextQuestion();
    }
function scheduleNextQuestion() {
  setTimeout(() => {
    if (state.questionCount >= 10) {
      showResultScreen();
    } else {
      state.questionCount++;
      state.feedback = null;
      state.showNote = false;

      // ★追加：前のスコア表示をリセット
      document.getElementById('ui-added-score').classList.add('hidden');

      renderStaffNote(null);
      setCatMessage(`第${state.questionCount}問！`);
      
      const targetNotes = STAGES[state.stage - 1].map(id => ALL_NOTES[id]);
      generateBalloons(targetNotes);

      setTimeout(() => {
        state.currentNote = state.questionList[state.questionCount - 1];
        state.showNote = true;
        renderStaffNote(state.currentNote);
        updateBalloonsState('playing', null);
        setCatMessage('どれかな？');
        
        state.startTime = Date.now();
        if(rAF_TimerId) cancelAnimationFrame(rAF_TimerId);
        updatePointsDisplay();
      }, 1000);
    }
  }, 1500);
}

    function showResultScreen() {
      state.gameState = 'result';
      stopBGM();
      document.getElementById('staff-container').classList.add('hidden');
      
      const elResult = document.getElementById('overlay-result');
      const elResultContent = document.getElementById('result-content');
      const elConfetti = document.getElementById('confetti-container');
      
      elResult.classList.remove('hidden');
      
      let html = `
        <h2 class="text-3xl font-black text-gray-800 mb-2">ステージ ${state.stage} 終了！</h2>
        <div class="text-6xl font-black text-orange-500 mb-4">${state.score} <span class="text-2xl text-gray-600">点</span></div>
      `;
      
      if (state.score >= 9000) {
        playSuperFanfare();
        elConfetti.innerHTML = Array.from({length: 60}).map(() => {
          const c = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#FFD700'][Math.floor(Math.random() * 6)];
          return `<div class="absolute w-3 h-3 animate-confetti" style="left: ${Math.random() * 100}%; top: -10%; background-color: ${c}; animation-delay: ${Math.random() * 3}s; animation-duration: ${1.5 + Math.random() * 2}s; border-radius: ${Math.random() > 0.5 ? '50%' : '0'}"></div>`;
        }).join('');
        elConfetti.classList.remove('hidden');
        
        html += `
          <p class="text-2xl font-black text-yellow-500 mb-6 animate-pulse">大・大・大成功！！<br/>パーフェクト級だね！</p>
          <button class="w-full py-4 bg-yellow-400 hover:bg-yellow-500 text-white text-2xl font-bold rounded-xl shadow-lg transition-transform hover:scale-105 active:scale-95 border-b-4 border-yellow-600" onclick="handleNextStage()">
            ${state.stage < 17 ? '次のステージへ！' : 'エンディングへ！'}
          </button>
        `;
      } else if (state.score >= 8000) {
        playFanfare();
        elConfetti.classList.add('hidden');
        html += `
          <p class="text-xl font-bold text-green-500 mb-6">目標の8000点達成！<br/>おめでとう！</p>
          <button class="w-full py-4 bg-green-500 hover:bg-green-600 text-white text-2xl font-bold rounded-xl shadow-lg transition-transform hover:scale-105 active:scale-95" onclick="handleNextStage()">
            ${state.stage < 17 ? '次のステージへ！' : 'エンディングへ！'}
          </button>
        `;
      } else {
        playFailSound();
        elConfetti.classList.add('hidden');
        html += `
          <p class="text-lg font-bold text-red-500 mb-6">8000点に届かなかった...<br/>もう一度挑戦しよう！</p>
          <button class="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold rounded-xl shadow-lg transition-transform hover:scale-105 active:scale-95" onclick="startGame(${state.stage})">
            もういちど挑戦する
          </button>
        `;
      }
      elResultContent.innerHTML = html;
    }

    window.handleNextStage = function() {
      if (state.stage < 17) {
        startGame(state.stage + 1);
      } else {
        document.getElementById('overlay-result').classList.add('hidden');
        document.getElementById('overlay-allclear').classList.remove('hidden');
      }
    }

  </script>
</body>
</html>
