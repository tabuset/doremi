<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音名クイズ</title>
  <!-- Tailwind CSS を読み込む (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 音楽記号（ト音記号など）を文字化けさせないためのWebフォントを読み込む -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Music&display=swap" rel="stylesheet">
  <style>
    /* === アニメーションの定義 === */
    @keyframes flyCurve {
      0% { transform: translate(0, 0) scale(var(--b-scale)) rotate(0deg); opacity: 1; }
      10% { transform: translate(0, 10px) scale(calc(var(--b-scale) * 1.05)) rotate(0deg); opacity: 1; } 
      100% { transform: translate(var(--fly-x, 0px), -600px) scale(calc(var(--b-scale) * 0.6)) rotate(var(--fly-rot, 0deg)); opacity: 0; }
    }
    .animate-flyAway { animation: flyCurve 1.5s cubic-bezier(0.25, 0.1, 0.25, 1) forwards; }
    
    @keyframes shakeNote {
      0%, 100% { transform: translateX(0) scale(var(--b-scale)); }
      15%, 45%, 75% { transform: translateX(-15px) scale(calc(var(--b-scale) * 1.1)) rotate(-8deg); }
      30%, 60%, 90% { transform: translateX(15px) scale(calc(var(--b-scale) * 1.1)) rotate(8deg); }
    }
    .animate-shakeNote { animation: shakeNote 1s ease-in-out infinite; }
    
    @keyframes popUp {
      0% { transform: translateY(0) scale(0.5); opacity: 0; }
      50% { transform: translateY(-30px) scale(1.2); opacity: 1; }
      100% { transform: translateY(-50px) scale(1); opacity: 0; }
    }
    .animate-popUp { animation: popUp 1.5s ease-out forwards; }
    
    @keyframes confetti {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .animate-confetti { animation: confetti linear infinite; }

    /* タイトルの縁取り用 */
    .stroke-text {
      -webkit-text-stroke: 2px #1e3a8a; /* blue-900 */
    }
  </style>
</head>
<body class="flex justify-center items-center min-h-screen bg-gray-100 p-4 font-sans m-0">

  <!-- === ゲーム画面本体 === -->
  <div id="game-app" class="w-full max-w-3xl aspect-[4/3] relative overflow-hidden bg-[#87CEEB] rounded-xl shadow-2xl select-none">
    
    <!-- 背景の山と地面 -->
    <div class="absolute bottom-16 left-0 right-0 h-40 flex items-end opacity-90">
      <div class="w-1/3 h-24 bg-green-500 rounded-t-[100px] -ml-8"></div>
      <div class="w-1/2 h-32 bg-[#32CD32] rounded-t-[150px] -ml-16"></div>
      <div class="w-1/3 h-28 bg-green-500 rounded-t-[120px] -ml-16"></div>
      <div class="w-1/2 h-40 bg-[#32CD32] rounded-t-[180px] -ml-12"></div>
      <div class="w-1/3 h-24 bg-green-500 rounded-t-[100px] -ml-16 mr-[-50px]"></div>
    </div>
    <div class="absolute bottom-0 left-0 right-0 h-16 bg-[#8B4513] border-t-[12px] border-[#654321]"></div>

    <!-- UIヘッダー -->
    <div class="absolute top-4 left-4 flex flex-col gap-2">
      <div class="bg-white px-2 py-1 flex items-center gap-2 rounded shadow-sm border border-gray-200">
        <span class="text-gray-500 text-sm font-bold">ステージ</span>
        <span id="ui-stage" class="bg-blue-500 text-white font-bold px-3 py-0.5 rounded shadow-inner min-w-[4rem] text-center">音域 1</span>
      </div>
      <div class="bg-white px-2 py-1 flex items-center gap-2 rounded shadow-sm border border-gray-200">
        <span class="text-gray-500 text-sm font-bold">ポイント</span>
        <span id="ui-points" class="bg-orange-400 text-white font-bold px-3 py-0.5 rounded shadow-inner min-w-[3rem] text-center transition-colors">1000</span>
      </div>
    </div>
    <div class="absolute top-4 right-4 bg-white px-3 py-1 flex flex-col items-center rounded shadow-sm border border-gray-200">
      <span class="text-gray-500 text-sm font-bold">現在のスコア</span>
      <span id="ui-score" class="bg-orange-400 text-white font-bold px-4 py-0.5 rounded shadow-inner mt-1 min-w-[5rem] text-center text-lg">0</span>
    </div>

    <!-- キャラクターと吹き出し -->
    <div class="absolute left-[3%] bottom-[45%] z-20 scale-110 origin-bottom-left">
      <svg id="cat-svg" width="100" height="120" viewBox="0 0 120 150">
        <path d="M 20 100 Q 0 120 10 140 Q 20 150 30 130 Q 40 110 30 90" fill="#FF8C00" stroke="#000" stroke-width="2"/>
        <ellipse cx="60" cy="100" rx="30" ry="40" fill="#FF8C00" stroke="#000" stroke-width="2" transform="rotate(-15, 60, 100)" />
        <ellipse cx="55" cy="105" rx="20" ry="30" fill="#FFF" transform="rotate(-15, 55, 105)" />
        <rect x="40" y="130" width="15" height="20" rx="5" fill="#FF8C00" stroke="#000" stroke-width="2" />
        <rect x="70" y="125" width="15" height="20" rx="5" fill="#FF8C00" stroke="#000" stroke-width="2" />
        <path d="M 40 90 Q 20 80 30 70 Q 40 60 50 80" fill="#FF8C00" stroke="#000" stroke-width="2"/>
        <path d="M 80 85 Q 100 70 95 60 Q 90 50 75 75" fill="#FF8C00" stroke="#000" stroke-width="2"/>
        <ellipse cx="60" cy="50" rx="35" ry="30" fill="#FF8C00" stroke="#000" stroke-width="2" />
        <polygon points="30,35 20,10 45,25" fill="#FF8C00" stroke="#000" stroke-width="2" />
        <polygon points="90,35 100,10 75,25" fill="#FF8C00" stroke="#000" stroke-width="2" />
        <ellipse cx="60" cy="55" rx="25" ry="18" fill="#FFF" />
        <ellipse cx="45" cy="45" rx="8" ry="12" fill="#FFF" stroke="#000" stroke-width="2" />
        <ellipse cx="75" cy="45" rx="8" ry="12" fill="#FFF" stroke="#000" stroke-width="2" />
        <!-- 目と口 (JSで表情を変えるためにID付与) -->
        <circle id="cat-eye-l" cx="48" cy="45" r="3" fill="#000" />
        <circle id="cat-eye-r" cx="72" cy="45" r="3" fill="#000" />
        <ellipse cx="60" cy="55" rx="4" ry="3" fill="#000" />
        <path id="cat-mouth" d="M 50 65 Q 60 75 70 65" fill="none" stroke="#000" stroke-width="2" />
        <line x1="20" y1="50" x2="35" y2="52" stroke="#000" stroke-width="1" />
        <line x1="20" y1="58" x2="35" y2="56" stroke="#000" stroke-width="1" />
        <line x1="85" y1="52" x2="100" y2="50" stroke="#000" stroke-width="1" />
        <line x1="85" y1="56" x2="100" y2="58" stroke="#000" stroke-width="1" />
      </svg>
      <div class="absolute bottom-[110%] left-[20%] bg-white border-2 border-gray-300 rounded-xl p-3 shadow-md min-w-[160px] z-30">
        <p id="ui-cat-message" class="text-gray-800 font-bold text-sm text-center whitespace-pre-wrap">音名クイズだよ！<br/>クリックしてね！</p>
        <div class="absolute -bottom-[10px] left-1/2 -translate-x-1/2 w-0 h-0 border-l-[8px] border-l-transparent border-r-[8px] border-r-transparent border-t-[10px] border-t-gray-300"></div>
        <div class="absolute -bottom-[7px] left-1/2 -translate-x-1/2 w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-white"></div>
      </div>
    </div>

    <!-- 五線譜と音符 -->
    <div id="staff-container" class="absolute top-[20%] left-[28%] right-0 h-48 z-10 hidden">
      <!-- 枠外にはみ出ても描画されるように class="overflow-visible" を追加 -->
      <svg width="100%" height="100%" viewBox="0 0 500 250" preserveAspectRatio="xMinYMin meet" class="overflow-visible">
        <line x1="0" y1="50" x2="500" y2="50" stroke="#000" stroke-width="3" />
        <line x1="0" y1="75" x2="500" y2="75" stroke="#000" stroke-width="3" />
        <line x1="0" y1="100" x2="500" y2="100" stroke="#000" stroke-width="3" />
        <line x1="0" y1="125" x2="500" y2="125" stroke="#000" stroke-width="3" />
        <line x1="0" y1="150" x2="500" y2="150" stroke="#000" stroke-width="3" />
        <!-- Y座標を140から155に変更し、ソの線(y=125)に合わせて調整。サイズも微調整。 -->
        <text x="20" y="155" font-size="135" font-family="'Noto Music', 'Segoe UI Symbol', 'Apple Symbols', serif" fill="#000">𝄞</text>
        <g id="target-note-g" class="transition-all duration-300"></g>
      </svg>
      <div id="ui-added-score" class="absolute top-10 left-[60%] bg-white border-2 border-gray-200 rounded-[50%] px-4 py-2 font-bold text-gray-700 shadow-md z-30 hidden">
        +0
      </div>
    </div>

    <!-- 風船ボタン -->
    <div id="balloons-container" class="absolute bottom-2 left-0 w-full flex flex-nowrap justify-center items-end px-2 pointer-events-none z-20 overflow-visible">
      <!-- JSで動的に生成 -->
    </div>

    <!-- === タイトル画面 === -->
    <div id="overlay-title" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-[#a6e6ff] overflow-y-auto pt-10 pb-10">
      
      <!-- タイトルと猫 -->
      <div class="flex items-center justify-center gap-2 mb-10 shrink-0 mt-8">
        <!-- 猫のキャラクタ -->
        <div class="transform -rotate-6 animate-bounce">
          <svg width="80" height="96" viewBox="0 0 120 150">
            <path d="M 20 100 Q 0 120 10 140 Q 20 150 30 130 Q 40 110 30 90" fill="#FF8C00" stroke="#000" stroke-width="2"/>
            <ellipse cx="60" cy="100" rx="30" ry="40" fill="#FF8C00" stroke="#000" stroke-width="2" transform="rotate(-15, 60, 100)" />
            <ellipse cx="55" cy="105" rx="20" ry="30" fill="#FFF" transform="rotate(-15, 55, 105)" />
            <rect x="40" y="130" width="15" height="20" rx="5" fill="#FF8C00" stroke="#000" stroke-width="2" />
            <rect x="70" y="125" width="15" height="20" rx="5" fill="#FF8C00" stroke="#000" stroke-width="2" />
            <path d="M 40 90 Q 20 80 30 70 Q 40 60 50 80" fill="#FF8C00" stroke="#000" stroke-width="2"/>
            <path d="M 80 85 Q 100 70 95 60 Q 90 50 75 75" fill="#FF8C00" stroke="#000" stroke-width="2"/>
            <ellipse cx="60" cy="50" rx="35" ry="30" fill="#FF8C00" stroke="#000" stroke-width="2" />
            <polygon points="30,35 20,10 45,25" fill="#FF8C00" stroke="#000" stroke-width="2" />
            <polygon points="90,35 100,10 75,25" fill="#FF8C00" stroke="#000" stroke-width="2" />
            <ellipse cx="60" cy="55" rx="25" ry="18" fill="#FFF" />
            <ellipse cx="45" cy="45" rx="8" ry="12" fill="#FFF" stroke="#000" stroke-width="2" />
            <ellipse cx="75" cy="45" rx="8" ry="12" fill="#FFF" stroke="#000" stroke-width="2" />
            <circle cx="48" cy="45" r="3" fill="#000" />
            <circle cx="72" cy="45" r="3" fill="#000" />
            <ellipse cx="60" cy="55" rx="4" ry="3" fill="#000" />
            <path d="M 50 65 Q 60 75 70 65" fill="none" stroke="#000" stroke-width="2" />
            <line x1="20" y1="50" x2="35" y2="52" stroke="#000" stroke-width="1" />
            <line x1="20" y1="58" x2="35" y2="56" stroke="#000" stroke-width="1" />
            <line x1="85" y1="52" x2="100" y2="50" stroke="#000" stroke-width="1" />
            <line x1="85" y1="56" x2="100" y2="58" stroke="#000" stroke-width="1" />
          </svg>
        </div>
        <!-- タイトルロゴ風 -->
        <div class="text-5xl md:text-6xl font-black text-white drop-shadow-[0_4px_4px_rgba(0,0,0,0.4)] text-center stroke-text tracking-wider">
          音名クイズ
        </div>
      </div>
      
      <!-- モード選択 -->
      <div id="mode-select" class="w-full max-w-md flex flex-col gap-6 px-4 shrink-0">
        <button onclick="showStageSelect('range')" class="py-5 px-6 bg-blue-500 hover:bg-blue-400 text-white text-3xl font-bold rounded-2xl shadow-[0_8px_0_#1e40af] active:translate-y-[8px] active:shadow-none transition-all">
          音域モード
          <span class="block text-sm font-normal mt-2 opacity-90">決まった音域を練習しよう！（全5ステージ）</span>
        </button>
        <button onclick="showStageSelect('challenge')" class="py-5 px-6 bg-orange-500 hover:bg-orange-400 text-white text-3xl font-bold rounded-2xl shadow-[0_8px_0_#c2410c] active:translate-y-[8px] active:shadow-none transition-all">
          チャレンジモード
          <span class="block text-sm font-normal mt-2 opacity-90">徐々に増える音に挑戦！（全12ステージ）</span>
        </button>
      </div>

      <!-- 音域モード ステージ選択 -->
      <div id="stage-select-range" class="w-full max-w-lg hidden flex-col items-center px-4 pb-10 shrink-0">
        <h3 class="text-2xl font-bold text-blue-800 mb-6 bg-white/90 px-6 py-2 rounded-full shadow-sm border-2 border-blue-200">音域モード</h3>
        <!-- 音域モードは文字が少ないので2列のグリッドで配置 -->
        <div id="stage-btns-range" class="grid grid-cols-2 gap-3 w-full mb-8">
          <!-- JSで生成 -->
        </div>
        <button onclick="showTitleScreen()" class="py-3 px-8 bg-gray-500 hover:bg-gray-400 text-white text-xl font-bold rounded-full shadow-[0_4px_0_#374151] active:translate-y-[4px] active:shadow-none transition-all">タイトルへ戻る</button>
      </div>

      <!-- チャレンジモード ステージ選択 -->
      <div id="stage-select-challenge" class="w-full max-w-xl hidden flex-col items-center px-4 pb-10 shrink-0">
        <h3 class="text-2xl font-bold text-orange-800 mb-6 bg-white/90 px-6 py-2 rounded-full shadow-sm border-2 border-orange-200">チャレンジモード</h3>
        <!-- チャレンジモードは量が多いので2〜3列のグリッドで配置 -->
        <div id="stage-btns-challenge" class="grid grid-cols-2 sm:grid-cols-3 gap-2 w-full mb-8">
          <!-- JSで生成 -->
        </div>
        <button onclick="showTitleScreen()" class="py-3 px-8 bg-gray-500 hover:bg-gray-400 text-white text-xl font-bold rounded-full shadow-[0_4px_0_#374151] active:translate-y-[4px] active:shadow-none transition-all">タイトルへ戻る</button>
      </div>
    </div>

    <!-- リザルト画面 -->
    <div id="overlay-result" class="absolute inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm overflow-hidden hidden">
      <div id="confetti-container" class="absolute inset-0 pointer-events-none z-0 hidden"></div>
      <div id="result-content" class="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-md w-full border-4 border-blue-400 transform transition-all relative z-10 mx-4">
        <!-- JSで動的に生成 -->
      </div>
    </div>

    <!-- 全クリ画面 (エンディング) -->
    <div id="overlay-allclear" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-[#fff0f5] hidden overflow-hidden">
       <!-- 紙吹雪を大量に降らせるコンテナ -->
       <div id="allclear-confetti" class="absolute inset-0 pointer-events-none z-0"></div>
       <div class="text-5xl md:text-6xl font-black text-pink-500 mb-8 animate-bounce drop-shadow-md z-10 text-center">完全クリア！！</div>
       <div class="text-2xl font-bold text-gray-800 mb-10 z-10 bg-white/80 px-6 py-3 rounded-full shadow-sm">あなたは真の音符マスターです！</div>
       <button class="py-4 px-12 bg-pink-500 hover:bg-pink-400 text-white text-2xl font-bold rounded-full shadow-[0_6px_0_#be185d] active:translate-y-[6px] active:shadow-none transition-all z-10" onclick="showTitleScreen()">
          タイトルへ戻る
        </button>
    </div>

  </div>

  <script>
    // === データの定義 ===
    const ALL_NOTES = {
      'g3': { id: 'g3', label: 'ソ', y: 212.5, freq: 196.00, color: '#4ADE80' },
      'a3': { id: 'a3', label: 'ラ', y: 200,   freq: 220.00, color: '#60A5FA' },
      'b3': { id: 'b3', label: 'シ', y: 187.5, freq: 246.94, color: '#F87171' },
      'c4': { id: 'c4', label: 'ド', y: 175,   freq: 261.63, color: '#D946EF' },
      'd4': { id: 'd4', label: 'レ', y: 162.5, freq: 293.66, color: '#FDE047' },
      'e4': { id: 'e4', label: 'ミ', y: 150,   freq: 329.63, color: '#38BDF8' },
      'f4': { id: 'f4', label: 'ファ', y: 137.5, freq: 349.23, color: '#FB923C' },
      'g4': { id: 'g4', label: 'ソ', y: 125,   freq: 392.00, color: '#4ADE80' },
      'a4': { id: 'a4', label: 'ラ', y: 112.5, freq: 440.00, color: '#60A5FA' },
      'b4': { id: 'b4', label: 'シ', y: 100,   freq: 493.88, color: '#F87171' },
      'c5': { id: 'c5', label: 'ド', y: 87.5,  freq: 523.25, color: '#D946EF' },
      'd5': { id: 'd5', label: 'レ', y: 75,    freq: 587.33, color: '#FDE047' },
      'e5': { id: 'e5', label: 'ミ', y: 62.5,  freq: 659.25, color: '#38BDF8' },
      'f5': { id: 'f5', label: 'ファ', y: 50,    freq: 698.46, color: '#FB923C' },
      'g5': { id: 'g5', label: 'ソ', y: 37.5,  freq: 783.99, color: '#4ADE80' },
    };

    // 音域モード (旧ステージ1〜5)
    const RANGE_STAGES = [
      ['c4', 'd4', 'e4'],
      ['f4', 'g4', 'a4'],
      ['b4', 'c5', 'd5'],
      ['e5', 'f5', 'g5'],
      ['g3', 'a3', 'b3'],
    ];

    // チャレンジモード (旧ステージ6〜17に相当する全12ステージ)
    const CHALLENGE_STAGES = [
      ['c4', 'd4', 'e4', 'f4'], // 1
      ['c4', 'd4', 'e4', 'f4', 'g4'], // 2
      ['c4', 'd4', 'e4', 'f4', 'g4', 'a4'], // 3
      ['c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4'], // 4
      ['c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5'], // 5
      ['c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5'], // 6
      ['b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5'], // 7
      ['b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5', 'e5'], // 8
      ['a3', 'b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5', 'e5'], // 9
      ['a3', 'b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5', 'e5', 'f5'], // 10
      ['g3', 'a3', 'b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5', 'e5', 'f5'], // 11
      ['g3', 'a3', 'b3', 'c4', 'd4', 'e4', 'f4', 'g4', 'a4', 'b4', 'c5', 'd5', 'e5', 'f5', 'g5'], // 12
    ];

    // === 状態管理 ===
    const state = {
      mode: 'range', // 'range' | 'challenge'
      stage: 1,
      gameState: 'title', // 'title', 'playing', 'result', 'allclear'
      questionCount: 0,
      score: 0,
      currentPoints: 0,
      currentNote: null,
      showNote: false,
      feedback: null,
      questionList: [],
      startTime: null,
      maxUnlockedChallenge: 1 // 解放済みの最大チャレンジステージ
    };

    let audioCtx = null;
    let bgmTimerId = null;
    let rAF_TimerId = null;

    // === セーブデータ管理 (localStorage) ===
    function loadProgress() {
      try {
        const saved = localStorage.getItem('oto-quiz-progress');
        if (saved) {
          state.maxUnlockedChallenge = parseInt(saved, 10);
        }
      } catch (e) {
        console.warn("セーブデータの読み込みに失敗しました", e);
      }
    }

    function saveProgress(unlockedStage) {
      if (unlockedStage > state.maxUnlockedChallenge && unlockedStage <= 12) {
        state.maxUnlockedChallenge = unlockedStage;
        try {
          localStorage.setItem('oto-quiz-progress', state.maxUnlockedChallenge.toString());
        } catch (e) {
          console.warn("セーブデータの保存に失敗しました", e);
        }
      }
    }

    // === 初期化とタイトル画面 ===
    function initStageSelectUI() {
      // 音域モード用ボタン生成
      const rangeContainer = document.getElementById('stage-btns-range');
      let rangeHtml = '';
      for (let i = 1; i <= 5; i++) {
        const label = RANGE_STAGES[i-1].map(id => ALL_NOTES[id].label).join('');
        rangeHtml += `
          <button onclick="startGame('range', ${i})" class="bg-white hover:bg-blue-50 text-blue-600 rounded-xl shadow-[0_4px_0_#93c5fd] border-2 border-blue-200 active:translate-y-[4px] active:shadow-none transition-all flex flex-col items-center justify-center py-2 px-1">
            <span class="text-lg font-bold">ステージ ${i}</span>
            <span class="text-sm text-gray-500 mt-1">${label}</span>
          </button>
        `;
      }
      rangeContainer.innerHTML = rangeHtml;

      // チャレンジモード用ボタン生成
      const challengeContainer = document.getElementById('stage-btns-challenge');
      let challengeHtml = '';
      for (let i = 1; i <= 12; i++) {
        const label = CHALLENGE_STAGES[i-1].map(id => ALL_NOTES[id].label).join('');
        const textClass = label.length > 10 ? "text-[10px]" : "text-xs";
        
        if (i <= state.maxUnlockedChallenge) {
          challengeHtml += `
            <button onclick="startGame('challenge', ${i})" class="bg-white hover:bg-orange-50 text-orange-600 rounded-xl shadow-[0_4px_0_#fdba74] border-2 border-orange-200 active:translate-y-[4px] active:shadow-none transition-all flex flex-col items-center justify-center py-2 px-1 overflow-hidden">
              <span class="text-base font-bold">Ch. ${i}</span>
              <span class="${textClass} text-gray-500 mt-1 break-all text-center leading-tight px-1">${label}</span>
            </button>
          `;

    // === オーディオ関連 ===
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function startBGM() {
      if (!audioCtx || bgmTimerId) return;
      let nextNoteTime = audioCtx.currentTime + 0.1;
      let current16thNote = 0;

      function playDrum(freq, type, decay, vol, time) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, time);
        if(type === 'sine') osc.frequency.exponentialRampToValueAtTime(0.01, time + decay);
        gain.gain.setValueAtTime(vol, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + decay);
        osc.start(time);
        osc.stop(time + decay);
      }

      function scheduleNote() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
          if (current16thNote % 8 === 0) playDrum(150, 'sine', 0.4, 0.6, nextNoteTime);
          else if (current16thNote % 8 === 4) playDrum(250, 'triangle', 0.2, 0.4, nextNoteTime);
          if (current16thNote % 2 === 0) playDrum(6000, 'square', 0.05, 0.05, nextNoteTime);
          
          nextNoteTime += 0.25 * (60.0 / 110);
          current16thNote = (current16thNote + 1) % 16;
        }
        bgmTimerId = setTimeout(scheduleNote, 25.0);
      }
      scheduleNote();
    }

    function stopBGM() {
      if (bgmTimerId) {
        clearTimeout(bgmTimerId);
        bgmTimerId = null;
      }
    }

    function playWrongSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
    }

    function playCorrectSound(note) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(note.label + 'ー');
        utterance.lang = 'ja-JP';
        const pitchMap = { 'g3': 0.6, 'a3': 0.7, 'b3': 0.8, 'c4': 1.0, 'd4': 1.1, 'e4': 1.2, 'f4': 1.3, 'g4': 1.4, 'a4': 1.5, 'b4': 1.6, 'c5': 1.7, 'd5': 1.8, 'e5': 1.9, 'f5': 2.0, 'g5': 2.0 };
        utterance.pitch = pitchMap[note.id] || 1.0;
        window.speechSynthesis.speak(utterance);
      }

      const oscNote = audioCtx.createOscillator();
      const gainNote = audioCtx.createGain();
      oscNote.type = 'sine';
      oscNote.frequency.setValueAtTime(note.freq, now);
      gainNote.gain.setValueAtTime(0.5, now);
      gainNote.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
      oscNote.connect(gainNote);
      gainNote.connect(audioCtx.destination);
      oscNote.start(now);
      oscNote.stop(now + 0.6);

      const oscCoin = audioCtx.createOscillator();
      const gainCoin = audioCtx.createGain();
      oscCoin.type = 'square';
      oscCoin.frequency.setValueAtTime(987.77, now);
      oscCoin.frequency.setValueAtTime(1318.51, now + 0.1);
      gainCoin.gain.setValueAtTime(0, now);
      gainCoin.gain.linearRampToValueAtTime(0.2, now + 0.05);
      gainCoin.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      oscCoin.connect(gainCoin);
      gainCoin.connect(audioCtx.destination);
      oscCoin.start(now);
      oscCoin.stop(now + 0.4);
    }

    function playFanfare() {
      if (!audioCtx) return;
      [261.63, 329.63, 392.00, 523.25].forEach((freq, i) => {
        setTimeout(() => {
          const osc = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
          gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
          osc.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.4);
        }, i * 150);
      });
    }

    function playSuperFanfare() {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      const notes = [
        { f: 261.63, t: 0 }, { f: 329.63, t: 0.1 }, { f: 392.00, t: 0.2 },
        { f: 523.25, t: 0.3 }, { f: 659.25, t: 0.4 }, { f: 783.99, t: 0.5 }, { f: 1046.50, t: 0.6 }
      ];
      notes.forEach(note => {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(note.f, now + note.t);
        gainNode.gain.setValueAtTime(0, now + note.t);
        gainNode.gain.linearRampToValueAtTime(0.2, now + note.t + 0.05);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + note.t + 0.5);
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start(now + note.t);
        osc.stop(now + note.t + 0.5);
      });
      setTimeout(() => {
        [523.25, 659.25, 783.99, 1046.50].forEach(f => {
          const osc = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.setValueAtTime(f, audioCtx.currentTime);
          gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
          osc.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + 1.5);
        });
      }, 700);
    }

    function playFailSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 1.5);
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 1.5);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 1.5);
    }

    function generateBalloons(stageNotes) {

    function updateBalloonsState(status, correctNoteId) {
      const balloons = document.querySelectorAll('.balloon-btn');
      balloons.forEach(b => {
        const noteId = b.id.replace('balloon-', '');
        b.className = `balloon-btn relative flex flex-col items-center transition-transform duration-200 cursor-pointer`;
        
        if (status === 'playing') {
          b.classList.add('opacity-100', 'pointer-events-auto', 'hover:-translate-y-2', 'active:scale-95');
        } else {
          b.classList.add('pointer-events-none');
          if (status === 'correct' && noteId === correctNoteId) {
            b.classList.add('animate-flyAway');
          } else if ((status === 'wrong' || status === 'timeout') && noteId === correctNoteId) {
            b.classList.add('animate-shakeNote', 'z-40', 'opacity-100');
          } else {
            b.classList.add('opacity-50');
          }
        }
      });
    }

    // === ゲームロジック ===
    
    // 【改善】問題数を10問に固定し、10個を超える場合は新出音を優先して残りをランダム抽出
    function generateQuestions(mode, stage) {
      const stageNotesArr = mode === 'range' ? RANGE_STAGES[stage - 1] : CHALLENGE_STAGES[stage - 1];
      const targetNotes = stageNotesArr.map(id => ALL_NOTES[id]);
      
      let list = [];
      
      if (targetNotes.length > 10) {
        // 10個を超える場合：10問すべて異なる音にする
        let newNotes = [];
        let oldNotes = [...targetNotes];
        
        // チャレンジモードでステージ2以降の場合、前のステージから増えた音を特定する
        if (mode === 'challenge' && stage > 1) {
          const prevStageNotesArr = CHALLENGE_STAGES[stage - 2];
          newNotes = targetNotes.filter(n => !prevStageNotesArr.includes(n.id));
          oldNotes = targetNotes.filter(n => prevStageNotesArr.includes(n.id));
        }
        
        // 古い音をシャッフル
        oldNotes.sort(() => Math.random() - 0.5);
        
        // 新しい音を先に入れ、残りを古い音から取って合計10個にする
        let selectedNotes = [...newNotes];
        const needed = 10 - selectedNotes.length;
        selectedNotes = selectedNotes.concat(oldNotes.slice(0, needed));
        
        // 最後に10個をシャッフルして出題順を決める
        selectedNotes.sort(() => Math.random() - 0.5);
        list = selectedNotes;
        
      } else {
        // 10個以下の場合：全種類を最低1回出しつつ、10問に満たない分はランダム補充（連続出題は避ける）
        let pool = [...targetNotes];
        
        for (let i = 0; i < 10; i++) {
          if (pool.length === 0) {
            pool = [...targetNotes];
          }
          
          let validPool = pool;
          if (i > 0) {
            const prevId = list[i - 1].id;
            validPool = pool.filter(n => n.id !== prevId);
            
            if (validPool.length === 0) {
               pool = [...targetNotes];
               validPool = pool.filter(n => n.id !== prevId);
            }
          }
          
          const pickedIndex = Math.floor(Math.random() * validPool.length);
          const picked = validPool[pickedIndex];
          list.push(picked);
          
          const removeIndex = pool.findIndex(n => n.id === picked.id);
          if (removeIndex !== -1) {
            pool.splice(removeIndex, 1);
          }
        }
      }
      
      return list;
    }

    function updatePointsDisplay() {
      if (state.gameState === 'playing' && state.showNote && state.feedback === null) {
        const elapsed = Date.now() - state.startTime;
        const nextPoints = Math.max(0, 1000 - Math.floor(elapsed / 10));
        
        const el = document.getElementById('ui-points');
        el.innerText = String(nextPoints).padStart(3, '0');
        el.className = nextPoints < 300 
          ? 'bg-red-500 text-white font-bold px-3 py-0.5 rounded shadow-inner min-w-[3rem] text-center transition-colors' 
          : 'bg-orange-400 text-white font-bold px-3 py-0.5 rounded shadow-inner min-w-[3rem] text-center transition-colors';
        
        if (nextPoints <= 0) {
          state.currentPoints = 0;
          handleTimeout();
        } else {
          rAF_TimerId = requestAnimationFrame(updatePointsDisplay);
        }
      }
    }

    window.startGame = function(mode, targetStage) {
      initAudio();
      document.getElementById('overlay-title').classList.add('hidden');
      document.getElementById('overlay-result').classList.add('hidden');
      document.getElementById('overlay-allclear').classList.add('hidden');

      state.mode = mode;
      state.stage = targetStage;
      state.score = 0;
      state.questionCount = 1;
      state.gameState = 'playing';
      state.feedback = null;
      state.showNote = false;

      const stageDisplay = mode === 'range' ? `音域 ${state.stage}` : `Ch. ${state.stage}`;
      document.getElementById('ui-stage').innerText = stageDisplay;
      
      updateScore(0);
      setCatMessage('第1問！');
      
      const stageNotesArr = mode === 'range' ? RANGE_STAGES[targetStage - 1] : CHALLENGE_STAGES[targetStage - 1];
      const targetNotes = stageNotesArr.map(id => ALL_NOTES[id]);

      // 【変更】問題リストの生成。10問固定で生成される。
      state.questionList = generateQuestions(mode, targetStage);
      
      generateBalloons(targetNotes);
      document.getElementById('staff-container').classList.remove('hidden');
      renderStaffNote(null);
      startBGM();

      setTimeout(() => {
        state.currentNote = state.questionList[0];
        state.showNote = true;
        renderStaffNote(state.currentNote);
        updateBalloonsState('playing', null);
        setCatMessage('どれかな？');
        
        state.startTime = Date.now();
        if(rAF_TimerId) cancelAnimationFrame(rAF_TimerId);
        updatePointsDisplay();
      }, 1000);
    }

    window.handleGuess = function(noteId) {
      if (state.gameState !== 'playing' || state.feedback !== null || !state.showNote) return;
      
      const elapsed = Date.now() - state.startTime;
      const actualPoints = Math.max(0, 1000 - Math.floor(elapsed / 10));
      const isCorrect = noteId === state.currentNote.id;

      state.feedback = isCorrect ? 'correct' : 'wrong';

      if (isCorrect) {
        const randomX = Math.floor(Math.random() * 300) - 150;
        const b = document.getElementById(`balloon-${noteId}`);
        b.style.setProperty('--fly-x', `${randomX}px`);
        b.style.setProperty('--fly-rot', `${randomX * 0.15}deg`);

        playCorrectSound(ALL_NOTES[noteId]);
        state.score += actualPoints;
        updateScore(state.score);
        showAddedScore(actualPoints);
        setCatMessage('正解！', true, false);
      } else {
        playWrongSound();
        setCatMessage('残念！', false, true);
      }

      updateBalloonsState(state.feedback, state.currentNote.id);
      scheduleNextQuestion();
    }

    function handleTimeout() {
      state.feedback = 'wrong';
      playWrongSound();
      setCatMessage('時間切れ！', false, true);
      updateBalloonsState('timeout', state.currentNote.id);
      scheduleNextQuestion();
    }

    function scheduleNextQuestion() {
      setTimeout(() => {
        // 【変更】問題数を10問で判定
        if (state.questionCount >= 10) {
          showResultScreen();
        } else {
          state.questionCount++;
          state.feedback = null;
          state.showNote = false;

          document.getElementById('ui-added-score').classList.add('hidden');
          renderStaffNote(null);
          setCatMessage(`第${state.questionCount}問！`);
          
          const stageNotesArr = state.mode === 'range' ? RANGE_STAGES[state.stage - 1] : CHALLENGE_STAGES[state.stage - 1];
          const targetNotes = stageNotesArr.map(id => ALL_NOTES[id]);
          generateBalloons(targetNotes);

          setTimeout(() => {
            state.currentNote = state.questionList[state.questionCount - 1];
            state.showNote = true;
            renderStaffNote(state.currentNote);
            updateBalloonsState('playing', null);
            setCatMessage('どれかな？');
            
            state.startTime = Date.now();
            if(rAF_TimerId) cancelAnimationFrame(rAF_TimerId);
            updatePointsDisplay();
          }, 1000);
        }
      }, 1500);
    }

    function showResultScreen() {
      state.gameState = 'result';
      stopBGM();
      document.getElementById('staff-container').classList.add('hidden');
      
      const elResult = document.getElementById('overlay-result');
      const elResultContent = document.getElementById('result-content');
      const elConfetti = document.getElementById('confetti-container');
      
      elResult.classList.remove('hidden');

      // 【変更】クリア基準を8000点で固定

      const superScore = 9000;
      
      const modeName = state.mode === 'range' ? '音域モード' : 'チャレンジモード';
      let html = `

        <div class="text-6xl font-black text-orange-500 mb-4">${state.score} <span class="text-2xl text-gray-600">点</span></div>
      `;
      
      if (state.score >= clearScore) {
        if (state.mode === 'challenge') {
          saveProgress(state.stage + 1);
        }

        let btnColor = '';
        if (state.score >= superScore) {
          playSuperFanfare();
          elConfetti.innerHTML = Array.from({length: 60}).map(() => {
            const c = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#FFD700'][Math.floor(Math.random() * 6)];
            return `<div class="absolute w-3 h-3 animate-confetti" style="left: ${Math.random() * 100}%; top: -10%; background-color: ${c}; animation-delay: ${Math.random() * 3}s; animation-duration: ${1.5 + Math.random() * 2}s; border-radius: ${Math.random() > 0.5 ? '50%' : '0'}"></div>`;
          }).join('');
          elConfetti.classList.remove('hidden');
          
          html += `<p class="text-2xl font-black text-yellow-500 mb-6 animate-pulse">大・大・大成功！！<br/>パーフェクト級だね！</p>`;
          btnColor = 'bg-yellow-400 hover:bg-yellow-500 border-b-4 border-yellow-600 shadow-[0_4px_0_#ca8a04] active:translate-y-[4px] active:shadow-none';
        } else {
          playFanfare();
          elConfetti.classList.add('hidden');
          html += `<p class="text-xl font-bold text-green-500 mb-6">目標の${clearScore}点達成！<br/>おめでとう！</p>`;
          btnColor = 'bg-green-500 hover:bg-green-600 border-b-4 border-green-700 shadow-[0_4px_0_#15803d] active:translate-y-[4px] active:shadow-none';
        }

        if (state.mode === 'range') {
          html += `<button class="w-full py-4 ${btnColor} text-white text-2xl font-bold rounded-xl transition-all" onclick="showTitleScreen()">タイトルへ戻る</button>`;
        } else {
          const btnText = state.stage < 12 ? '次のステージへ！' : 'エンディングへ！';
          html += `<button class="w-full py-4 ${btnColor} text-white text-2xl font-bold rounded-xl transition-all" onclick="handleNextStage()">${btnText}</button>`;
        }

      } else {
        playFailSound();
        elConfetti.classList.add('hidden');
        html += `
          <p class="text-lg font-bold text-red-500 mb-6">${clearScore}点に届かなかった...<br/>もう一度挑戦しよう！</p>
          <div class="flex flex-col gap-3">
            <button class="w-full py-4 bg-blue-500 hover:bg-blue-600 text-white text-2xl font-bold rounded-xl shadow-[0_4px_0_#1d4ed8] active:translate-y-[4px] active:shadow-none transition-all" onclick="startGame('${state.mode}', ${state.stage})">もういちど挑戦する</button>
            <button class="w-full py-3 bg-gray-400 hover:bg-gray-500 text-white text-xl font-bold rounded-xl shadow-[0_4px_0_#4b5563] active:translate-y-[4px] active:shadow-none transition-all" onclick="showTitleScreen()">タイトルへ戻る</button>
          </div>
        `;
      }
      elResultContent.innerHTML = html;
    }

    window.handleNextStage = function() {
      if (state.mode === 'challenge') {
        if (state.stage < 12) {
          startGame('challenge', state.stage + 1);
        } else {
          showAllClearScreen();
        }
      }
    }

    // 全クリ画面演出
    function showAllClearScreen() {
      document.getElementById('overlay-result').classList.add('hidden');
      const elAllClear = document.getElementById('overlay-allclear');
      elAllClear.classList.remove('hidden');

      const elConfetti = document.getElementById('allclear-confetti');
      elConfetti.innerHTML = Array.from({length: 150}).map(() => {
        const c = ['#FF5733', '#33FF57', '#3357FF', '#F3FF33', '#FF33F3', '#FFD700', '#FF1493', '#00FFFF'][Math.floor(Math.random() * 8)];
        return `<div class="absolute w-4 h-4 animate-confetti" style="left: ${Math.random() * 100}%; top: -10%; background-color: ${c}; animation-delay: ${Math.random() * 5}s; animation-duration: ${2 + Math.random() * 3}s; border-radius: ${Math.random() > 0.5 ? '50%' : '0'}"></div>`;
      }).join('');
      
      playSuperFanfare();
    }

  </script>
</body>
</html>
